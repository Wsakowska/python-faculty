{% extends 'base.html' %}

{% block title %}Usuń przepis — Co mam w lodówce?{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                <h3 class="mt-3">Usunąć przepis?</h3>
                <p class="text-muted">
                    Czy na pewno chcesz usunąć przepis <strong>„{{ recipe.title }}"</strong>?
                    Tej operacji nie można cofnąć.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Tak, usuń
                    </button>
                    <a href="{% url 'recipes:recipe_detail' recipe.slug %}"
                       class="btn btn-outline-secondary">Anuluj</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
