{% extends 'base.html' %}

{% block title %}Logowanie — Co mam w lodówce?{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-success"></i> Logowanie
                </h2>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">
                                {{ field.label }}
                            </label>
                            <input type="{{ field.field.widget.input_type }}"
                                   name="{{ field.html_name }}"
                                   id="{{ field.id_for_label }}"
                                   class="form-control {% if field.errors %}is-invalid{% endif %}"
                                   value="{{ field.value|default:'' }}">
                            {% for error in field.errors %}
                                <div class="invalid-feedback">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100">Zaloguj się</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Nie masz konta?
                    <a href="{% url 'accounts:register' %}">Zarejestruj się</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
